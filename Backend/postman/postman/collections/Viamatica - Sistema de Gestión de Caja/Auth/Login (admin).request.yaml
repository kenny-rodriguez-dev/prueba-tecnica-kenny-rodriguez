$kind: http-request
description: Guarda el token automáticamente. Acepta username o email. Se bloquea al 3er intento fallido.
url: "{{base_url}}/api/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "login": "admin1234",
      "password": "Admin1234"
    }
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      const data = pm.response.json();
      if (data.token) {
          pm.collectionVariables.set('token', data.token);
          console.log('Token guardado para el resto de peticiones');
      }
    language: text/javascript
order: 1000
