$kind: http-request
url: "{{base_url}}/api/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "login": "cajero123",
      "password": "Cajero123"
    }
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      const data = pm.response.json();
      if (data.token) {
          pm.collectionVariables.set('token', data.token);
          console.log('Token guardado para el resto de peticiones');
      }
    language: text/javascript
order: 3000
